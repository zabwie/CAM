# Cam Local Server — Professional / Hybrid tier
# Same compose file works for on-prem and cloud-local deployments.
# Adjust env vars per deployment.

services:
  edge:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.edge
    restart: unless-stopped
    devices:
      - /dev/video0:/dev/video0  # Camera passthrough
    volumes:
      - edge-data:/var/cam
    environment:
      - SERVER_URL=http://api:3000
      - DEVICE_ID=dev_edge_001
      - FPS=30
    depends_on:
      - api
    profiles:
      - edge   # only starts with `docker compose --profile edge up`


  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.cam.local`)"
      - "traefik.http.routers.web.rule=Host(`cam.local`)"

  api:
    build: ../server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      - NODE_ENV=production
      - DB_URL=postgres://cam:${DB_PASSWORD}@db:5432/cam
      - MQTT_URL=mqtt://mqtt:1883
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
    labels:
      - "traefik.http.routers.api.rule=Host(`api.cam.local`)"
      - "traefik.http.services.api.loadbalancer.server.port=3000"

  web:
    build: ../web
    restart: unless-stopped
    labels:
      - "traefik.http.routers.web.rule=Host(`cam.local`)"
      - "traefik.http.services.web.loadbalancer.server.port=80"

  db:
    image: timescale/timescaledb:2-pg16
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=cam
      - POSTGRES_USER=cam
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cam"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - media-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}

  mqtt:
    image: emqx/emqx:latest
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "8083:8083"   # MQTT/WS
    volumes:
      - mqtt-data:/opt/emqx/data

  sync-agent:
    build: ../server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "dist/sync-agent/index.js"]
    environment:
      - NODE_ENV=production
      - DB_URL=postgres://cam:${DB_PASSWORD}@db:5432/cam
      - CLOUD_API_URL=${CLOUD_API_URL}
      - CLOUD_API_KEY=${CLOUD_API_KEY}
      - TENANT_ID=${TENANT_ID}
    profiles:
      - hybrid   # only starts in hybrid/enterprise mode

volumes:
  db-data:
  media-data:
  mqtt-data:
  edge-data:
